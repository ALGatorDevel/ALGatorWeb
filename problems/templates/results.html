{% load static %}

<script src="{% static 'js/problems/draggable.js' %}"></script>
<link rel="stylesheet" href="{% static 'css/problems/draggable.css' %}">


<script src="{% static 'js/problems/presenter_data_editor.js' %}"></script>
<link rel="stylesheet" href="{% static 'css/problems/presenter_data_editor.css' %}">


<div style="height:50px;"></div>

<!-- editProject tabs -->
<div id="tabwrapper_presenters" class="tab-wrapper" style="max-width:100%;"></div>
<script>
  const curPage="presenters";
  addTabPane(curPage);

  const presData = addTab(curPage, "presData", "<i class='far fa-list-alt icon'></i>&nbsp;&nbsp;Presenters data", showPresentersData, 1);
  presData.classList.add('editMode');
  presData.setAttribute('w', '{{ project.eid }} car');

  const newButton = addTab(curPage, "newpresenter", "<i class='far fa-plus-square icon'></i>&nbsp;&nbsp;New presenter", createNewPresenter, 1);
  newButton.classList.add('editMode');
  newButton.setAttribute('w', '{{ project.eid }} car');


  wireTabs(curPage);
</script>


<div class="innerContent" style="overflow:hidden;" id="presentersContent"> 
  <div class='w3-container' id='newPresenter' style='display: none;'></div>
  <div id="loading_presenters_div" style="padding: 15px;">... loading presenters</div>
  <div id="no_presenters_div"      style="padding: 15px; display: none">No presenters defined.</div>
  <div class="w3-container" id='presenters'></div>
  
  <div id="presenters_data_panel" 
       style="display:none; padding:10px;margin:10px; border: 1px solid rgb(204, 204, 204);  overflow: auto;">

      {% include "presenter_data_editor.html" %}   

  </div>

</div>


<script>

  window.onload = window.onresize = function () {
    setPresentersDataHeight();  
  };

</script>
