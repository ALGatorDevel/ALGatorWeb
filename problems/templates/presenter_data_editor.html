    <div>
        <div class="pde_panel-toolbar">
            <button onclick="pde.addFirstClassBox()"><i class="fas fa-plus"></i> Add Query</button>
            <button onclick="pde.centerFirstBox()"><i class="fas fa-crosshairs"></i></button>
        </div>
        <div id="diagram_canvas">
            <svg class="svg-layer" id="svg_connections">
                <defs>
                    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" 
                            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#444" />
                    </marker>
                </defs>
            </svg>
        </div>
    </div>

    <div id="type_modal" class="pde_modal">
        <div class="pde_modal-content">
            <h3>Select Box Type</h3>
            <div id="modal_type_buttons"></div>
            <div class="pde_modal-footer">
                <button onclick="document.getElementById('type_modal').style.display='none'" style="background: #eee; border: 1px solid #ccc;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="confirm_modal" class="pde_confirm-modal">
        <div class="pde_confirm-modal-content">
            <h3>Confirm Removal</h3>
            <p id="confirm_message">Are you sure? This will remove this box and all its descendants.</p>
            <div class="pde_confirm-modal-footer">
                <button onclick="pde.confirmRemove(false)" style="background: #eee; border: 1px solid #ccc;">Cancel</button>
                <button onclick="pde.confirmRemove(true)" style="background: #e74c3c; color: white; border: 1px solid #c0392b;">Remove</button>
            </div>
        </div>
    </div>

    <div id="rename_modal" class="pde_confirm-modal">
        <div class="pde_confirm-modal-content">
            <h3>Rename Box</h3>
            <input type="text" id="rename_input" placeholder="Enter new box name" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; margin: 15px 0;" onkeydown="if(event.key==='Enter') pde.confirmRename(); if(event.key==='Escape') pde.cancelRename();">
            <div class="pde_confirm-modal-footer">
                <button onclick="pde.cancelRename()" style="background: #eee; border: 1px solid #ccc;">Cancel</button>
                <button onclick="pde.confirmRename()" style="background: #3498db; color: white; border: 1px solid #2980b9;">Rename</button>
            </div>
        </div>
    </div>
